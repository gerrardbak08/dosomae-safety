<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
  }
  .wrap { width: 1200px; height: 630px; display: flex; }

  .left {
    width: 440px; height: 100%;
    background: #1a3fa8;
    padding: 56px 52px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    padding: 5px 14px;
    font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,0.85); letter-spacing: 1px;
  }
  .title { font-size: 48px; font-weight: 800; color: #fff; line-height: 1.15; letter-spacing: -1.5px; }
  .sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
  .org { font-size: 12px; color: rgba(255,255,255,0.35); }

  .right {
    flex: 1; height: 100%;
    background: #f4f6fb;
    padding: 52px 52px;
    display: flex; flex-direction: column; justify-content: space-between;
    border-left: 4px solid #1a3fa8;
  }
  .right-label {
    font-size: 11px; font-weight: 700; color: #1a3fa8; letter-spacing: 2px;
    padding-bottom: 14px; border-bottom: 1px solid #d4dcf0;
  }
  .items { display: flex; flex-direction: column; gap: 18px; }
  .item { display: flex; gap: 14px; align-items: flex-start; }
  .num { font-size: 12px; font-weight: 700; color: #1a3fa8; min-width: 20px; padding-top: 1px; }
  .item-text { font-size: 15px; font-weight: 700; color: #1a1f2e; line-height: 1.3; }
  .item-sub { font-size: 11px; color: #9aa5b8; margin-top: 2px; }
  .url { font-size: 10px; color: #c4c8d4; text-align: right; }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="badge">2026.04</div>
    <div>
      <div class="sub">도·소매업 안전보건 협의체</div>
      <div class="title">운영<br>현황</div>
    </div>
    <div class="org">㈜아성다이소 안전보건팀</div>
  </div>
  <div class="right">
    <div class="right-label">CONTENTS</div>
    <div class="items">
      <div class="item">
        <div class="num">01</div>
        <div><div class="item-text">도·소매업 안전보건 현황</div><div class="item-sub">산업재해 통계 · 업종 특성</div></div>
      </div>
      <div class="item">
        <div class="num">02</div>
        <div><div class="item-text">협의체 법적 의무</div><div class="item-sub">산업안전보건법 적용 요건</div></div>
      </div>
      <div class="item">
        <div class="num">03</div>
        <div><div class="item-text">운영 방향 및 실행 과제</div><div class="item-sub">반기 회의 · 위원 구성</div></div>
      </div>
    </div>
    <div class="url">gerrardbak08.github.io/dosomae-safety</div>
  </div>
</div>
</body>
</html>
