<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #1a3fa8;
  }
  .wrap {
    width: 1200px; height: 630px;
    background: #1a3fa8;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 64px 80px;
    position: relative; overflow: hidden;
  }
  /* 배경 원형 장식 */
  .wrap::before {
    content: '';
    position: absolute; right: -80px; top: -80px;
    width: 400px; height: 400px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .wrap::after {
    content: '';
    position: absolute; right: 100px; bottom: -120px;
    width: 300px; height: 300px; border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .top {
    display: flex; align-items: center; justify-content: space-between;
  }
  .badge {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    padding: 6px 16px;
    font-size: 12px; font-weight: 700;
    color: rgba(255,255,255,0.85); letter-spacing: 1px;
  }
  .date { font-size: 13px; color: rgba(255,255,255,0.4); }

  .mid {}
  .sub { font-size: 18px; color: rgba(255,255,255,0.55); margin-bottom: 16px; font-weight: 400; }
  .title { font-size: 64px; font-weight: 800; color: #fff; line-height: 1.1; letter-spacing: -2px; }

  .bottom {
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .org { font-size: 15px; color: rgba(255,255,255,0.5); }
  .url { font-size: 12px; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="badge">도·소매업 안전보건</div>
    <div class="date">2026.04</div>
  </div>
  <div class="mid">
    <div class="sub">협의체</div>
    <div class="title">운영 현황</div>
  </div>
  <div class="bottom">
    <div class="org">㈜아성다이소</div>
    <div class="url">gerrardbak08.github.io/dosomae-safety</div>
  </div>
</div>
</body>
</html>
